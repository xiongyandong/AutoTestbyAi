{% extends "base.html" %}

{% block title %}{% if module %}编辑模块{% else %}新增模块{% endif %} - Pytest 测试平台{% endblock %}
{% block nav_module %}active{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col">
        <h4><i class="bi bi-diagram-3"></i> {% if module %}编辑模块{% else %}新增模块{% endif %}</h4>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="project" class="form-label">所属项目 <span class="text-danger">*</span></label>
                <select class="form-select" id="project" name="project" required>
                    <option value="">请选择项目</option>
                    {% for p in projects %}
                    <option value="{{ p.pk }}" {% if form_data and form_data.project == p.pk|stringformat:"s" %}selected{% elif module and module.project.pk == p.pk %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">模块名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name"
                       value="{% if form_data %}{{ form_data.name }}{% elif module %}{{ module.name }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">模块描述</label>
                <textarea class="form-control" id="description" name="description" rows="3">{% if form_data %}{{ form_data.description }}{% elif module %}{{ module.description }}{% endif %}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
                <a href="{% url 'module_list' %}" class="btn btn-secondary"><i class="bi bi-x-lg"></i> 取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
