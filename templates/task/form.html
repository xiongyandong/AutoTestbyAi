{% extends "base.html" %}

{% block title %}新建任务 - Pytest 测试平台{% endblock %}
{% block nav_task %}active{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col"><h4><i class="bi bi-play-circle"></i> 新建任务</h4></div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" id="task-form">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">任务名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="task_name"
                               value="{% if form_data %}{{ form_data.task_name }}{% endif %}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">执行范围</label>
                        <select class="form-select" name="scope" id="scope-select">
                            <option value="TESTCASE">单用例</option>
                            <option value="MODULE">模块</option>
                            <option value="PROJECT">项目</option>
                            <option value="SCENE">场景</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">执行环境</label>
                        <select class="form-select" name="execute_env">
                            <option value="DEV">开发环境</option>
                            <option value="QA">测试环境</option>
                            <option value="PROD">生产环境</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">报告名称</label>
                        <input type="text" class="form-control" name="report_name"
                               value="{% if form_data %}{{ form_data.report_name }}{% endif %}"
                               placeholder="留空则使用任务名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">创建人</label>
                        <input type="text" class="form-control" name="created_by"
                               value="{% if form_data %}{{ form_data.created_by }}{% endif %}">
                    </div>
                </div>
            </div>

            <hr>
            <h6>执行目标</h6>

            <div class="scope-group" id="scope-testcase">
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">所属项目</label>
                            <select class="form-select" id="tc-project">
                                <option value="">请选择项目</option>
                                {% for p in projects %}
                                <option value="{{ p.pk }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">所属模块</label>
                            <select class="form-select" id="tc-module">
                                <option value="">请先选择项目</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">选择用例 <span class="text-danger">*</span></label>
                            <select class="form-select" name="testcase" id="tc-testcase">
                                <option value="">请先选择模块</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="scope-group" id="scope-module" style="display:none">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">所属项目</label>
                            <select class="form-select" id="mod-project">
                                <option value="">请选择项目</option>
                                {% for p in projects %}
                                <option value="{{ p.pk }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">选择模块 <span class="text-danger">*</span></label>
                            <select class="form-select" name="module" id="mod-module">
                                <option value="">请先选择项目</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="scope-group" id="scope-project" style="display:none">
                <div class="mb-3">
                    <label class="form-label">选择项目 <span class="text-danger">*</span></label>
                    <select class="form-select" name="project" id="proj-select">
                        <option value="">请选择项目</option>
                        {% for p in projects %}
                        <option value="{{ p.pk }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="scope-group" id="scope-scene" style="display:none">
                <div class="mb-3">
                    <label class="form-label">选择场景 <span class="text-danger">*</span></label>
                    <select class="form-select" name="scene">
                        <option value="">请选择场景</option>
                        {% for s in scenes %}
                        <option value="{{ s.pk }}">{{ s.project.name }} / {{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 创建</button>
                <a href="{% url 'task_list' %}" class="btn btn-secondary"><i class="bi bi-x-lg"></i> 取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleScope() {
    var scope = $('#scope-select').val();
    $('.scope-group').hide();
    $('#scope-' + scope.toLowerCase()).show();
}
$('#scope-select').change(toggleScope);
toggleScope();

$('#tc-project').change(function() {
    var projectId = $(this).val();
    var moduleSelect = $('#tc-module');
    moduleSelect.empty().append('<option value="">请选择模块</option>');
    $('#tc-testcase').empty().append('<option value="">请先选择模块</option>');
    if (projectId) {
        $.get('/configs/load-modules/', {project_id: projectId}, function(data) {
            data.forEach(function(m) {
                moduleSelect.append('<option value="' + m.id + '">' + m.name + '</option>');
            });
        });
    }
});

$('#tc-module').change(function() {
    var moduleId = $(this).val();
    var tcSelect = $('#tc-testcase');
    tcSelect.empty().append('<option value="">请选择用例</option>');
    if (moduleId) {
        $.get('/scenes/api/testcases/', {project_id: $('#tc-project').val()}, function(data) {
            data.forEach(function(tc) {
                tcSelect.append('<option value="' + tc.id + '">' + tc.name + ' (' + tc.method + ')</option>');
            });
        });
    }
});

$('#mod-project').change(function() {
    var projectId = $(this).val();
    var moduleSelect = $('#mod-module');
    moduleSelect.empty().append('<option value="">请选择模块</option>');
    if (projectId) {
        $.get('/configs/load-modules/', {project_id: projectId}, function(data) {
            data.forEach(function(m) {
                moduleSelect.append('<option value="' + m.id + '">' + m.name + '</option>');
            });
        });
    }
});
</script>
{% endblock %}
